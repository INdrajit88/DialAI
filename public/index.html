<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DialAI | Dashboard</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --success: #22c55e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 2rem;
        }
        .pulse {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 1.5rem;
            border-radius: 0.75rem;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            display: block;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .info-box {
            text-align: left;
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: monospace;
            font-size: 0.875rem;
            color: #94a3b8;
        }
        .info-label { color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">DialAI</div>
        <div class="status-badge">
            <div class="pulse"></div>
            Nova AI is Online
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span id="active-calls" class="stat-value">0</span>
                <span class="stat-label">Active Calls</span>
            </div>
            <div class="stat-card">
                <span id="uptime" class="stat-value">...</span>
                <span class="stat-label">Uptime</span>
            </div>
        </div>

        <div class="info-box">
            <div><span class="info-label">Endpoint:</span> /exotel/incoming</div>
            <div><span class="info-label">Provider:</span> Exotel</div>
            <div><span class="info-label">LLM:</span> Gemini 1.5 Flash</div>
        </div>
    </div>

    <script>
        async function updateStats() {
            try {
                const res = await fetch('/health');
                const data = await res.json();

                // Uptime calc
                const s = data.uptime_s;
                const h = Math.floor(s / 3600);
                const m = Math.floor((s % 3600) / 60);
                document.getElementById('uptime').textContent = `${h}h ${m}m`;

                // Detailed stats for active calls
                const detRes = await fetch('/health/detailed');
                const detData = await detRes.json();
                document.getElementById('active-calls').textContent = detData.calls.active || 0;
            } catch (e) {
                console.error("Failed to fetch stats", e);
            }
        }
        setInterval(updateStats, 5000);
        updateStats();
    </script>
</body>
</html>
